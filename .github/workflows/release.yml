name: Release to RubyGems
on:
  release:
    types:
      - published

permissions:
  contents: write
  id-token: write

jobs:
  rubygems-publish:
    name: upload release to RubyGems
    runs-on: ubuntu-24.04
    environment: release
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: false

      - name: Publish to RubyGems
        uses: rubygems/release-gem@v1
