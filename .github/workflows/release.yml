name: Release to RubyGems
on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  rubygems-publish:
    name: upload release to RubyGems
    runs-on: ubuntu-24.04
    environment: release
    env:
      GEM_VERSION: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Publish to RubyGems
        uses: rubygems/release-gem@v1
